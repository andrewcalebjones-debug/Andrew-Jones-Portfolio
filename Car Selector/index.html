<style>
    /* CSS by Google AI mode */
    :root {
        --deep-blue: #084c61;
        --medium-blue: #40798c;
        --light-blue: #70a288; 
        --off-white: #f5f5f5;
        --soft-yellow: #f9db6d;
        --vibrant-yellow: #eeb902;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--off-white);
        color: #333;
        margin: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    header {
        width: 100%;
        background-color: var(--deep-blue);
        color: white;
        padding: 1rem;
        text-align: right;
        font-size: 0.8em;
    }

    .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        margin-top: 2rem;
        width: 100%;
        max-width: 450px;
    }

    h2 {
        color: var(--deep-blue);
        border-bottom: 3px solid var(--vibrant-yellow);
        padding-bottom: 10px;
        margin-top: 0;
    }

    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
        color: var(--medium-blue);
    }

    select, input {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 2px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box; 
        transition: border-color 0.3s;
    }

    select:focus, input:focus {
        outline: none;
        border-color: var(--medium-blue);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 25px;
        background-color: var(--vibrant-yellow);
        color: #333;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.1s;
    }

    button:hover {
        background-color: var(--soft-yellow);
    }

    button:active {
        transform: scale(0.98);
    }

    #output, #history {
        margin-top: 20px;
        padding: 15px;
        background-color: #fff;
        border-left: 5px solid var(--medium-blue);
        border-radius: 4px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .error {
        color: #d9534f;
        background: #f9f2f2;
        padding: 5px 10px;
        border-radius: 4px;
        margin-top: 10px;
        font-size: 0.9em;
    }
</style>

<body>
    <header>2/28/2026</header>
    
    <div class="container">
        <h2>Car Selector</h2>

        <form id="carForm">
            <label>Your Name:
                <input type="text" id="name" required>
            </label>

            <label>Email:
                <input type="email" id="email" required>
            </label>

            <label>Car Brand:
                <select id="brand" required>
                    <option value="">-- choose a brand --</option>
                </select>
            </label>

            <label>Car Model:
                <select id="model" required>
                    <option value="">-- choose a model --</option>
                </select>
            </label>

            <button type="submit">Submit Request</button>
            <div id="errorBox" class="error"></div>
        </form>

        <label>Most Recent:
         <div id="output"></div>
        </label>
        <label>History:
         <div id="history"></div>
        </label>
    </div>

    <script src="script.js"></script>
</body>
